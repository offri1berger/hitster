# Grafana Alloy agent — scrapes /metrics and pushes to Grafana Cloud.
# Deploy from inside this directory: cd monitoring && fly deploy

app            = 'backspin-maestro-monitoring'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

# Alloy's built-in web UI (useful for debugging the pipeline in `fly ssh console`)
[http_service]
  internal_port        = 12345
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
